<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <main class="content">
            <section class="hero-card small">
                <h1>Log ind</h1>
                <p>Indtast dit brugernavn og kode for at fortsætte til invitationen.</p>
            </section>

            <section class="info-card">
                <label for="username">Brugernavn</label>
                <input id="username" type="text" placeholder="" autocomplete="username" spellcheck="false">
            </section>

            <section class="info-card">
                <label for="code">Kode</label>
                <input id="code" type="password" placeholder="" autocomplete="current-password" spellcheck="false">
            </section>

            <section class="button-group">
                <button class="button primary" id="loginButton">Log ind</button>
            </section>

            <section class="info-card" id="loginMessage">
                 <p><strong>Brugernavn:</strong> Dit fornavn med stort begyndelsesbogstav.<br><strong>Adgangskode:</strong> Dit fornavn med stort begyndelsesbogstav efterfulgt af 123.</p>
                <p><strong>Eksempel:</strong></p><p><strong>Brugernavn:</strong> Jens<br><strong>Kode:</strong> Jens123</p>
            </section>
        </main>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const codeInput = document.getElementById('code');
        const loginMessage = document.getElementById('loginMessage');
        const loginButton = document.getElementById('loginButton');
        const invitedUsers = ['Louisa','Anders','Emma','Frederik','Gustav','Julius','Kasper','Laura','Marie','Nicolai','Maya'];

        function showMessage(text, isError = false) {
            loginMessage.innerHTML = `<p style="color: ${isError ? '#b7484e' : '#505f38'}; margin: 0;">${text}</p>`;
        }

        function login() {
            const username = usernameInput.value.trim();
            const code = codeInput.value.trim();
            if (!username || !code) {
                showMessage('Begge felter skal udfyldes.', true);
                return;
            }
            const normalized = username.charAt(0).toUpperCase() + username.slice(1);
            if (!invitedUsers.includes(normalized)) {
                showMessage('Kun inviterede kan logge ind.', true);
                return;
            }
            const expectedCode = normalized + '123';
            if (code === expectedCode && username === normalized) {
                localStorage.setItem('event-user', normalized);
                window.location.href = 'invitation.html';
            } else {
                showMessage('Forkert brugernavn eller kode. Prøv igen.', true);
            }
        }

        loginButton.addEventListener('click', login);
        document.addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
