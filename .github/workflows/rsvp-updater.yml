name: RSVP Updater

on:
  repository_dispatch:
    types: [rsvp-update]

permissions:
  contents: write

jobs:
  update-responses:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get payload
        id: payload
        run: |
          echo "PAYLOAD<<EOF" >> $GITHUB_ENV
          echo "${{ toJson(github.event.client_payload) }}" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update responses.json
        run: |
          echo "$PAYLOAD" > /tmp/payload.json
          node -e "
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('/tmp/payload.json','utf8'));
          const repoFile = 'responses.json';
          const data = JSON.parse(fs.readFileSync(repoFile,'utf8'));
          // payload should be { name: 'Louisa', answer: 'Ja' }
          data[payload.name] = payload.answer;
          fs.writeFileSync(repoFile, JSON.stringify(data, null, 2));
          console.log('Updated', payload.name, '->', payload.answer);
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add responses.json
          git commit -m "Update response from repository_dispatch"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
