<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forsinket kandidatfejring - Louisa Xu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand">Forsinket kandidatfejring - Louisa Xu</div>
            <nav class="menu-bar">
                <a href="invitation.html">Forside</a>
                <a href="rsvp.html" class="active">Svar</a>
                <a href="guest-list.html">Gæsteliste</a>
            </nav>
        </header>

        <main class="content">
            <section class="hero-card small">
                <h1>Svar</h1>
                <p>Skal du med?</p>
            </section>

            <!-- RESPONSE BUTTONS -->
            <section class="info-card">
                <div class="button-list">
                    <button onclick="saveResponse('Ja')" class="response-button yes">Ja</button>
                    <button onclick="saveResponse('Måske')" class="response-button maybe">Måske</button>
                    <button onclick="saveResponse('Nej')" class="response-button no">Nej</button>
                </div>
            </section>

            <section class="info-card" id="statusMessage">
                <h2>Venter på dit svar...</h2>
                <p>Klik på en knap ovenfor.</p>
            </section>

            <section class="info-card">
                <h2>Hvorfor dit svar er vigtigt</h2>
                <p>Så Louisa ved hvor mange øl og mad hun skal købe!</p>
            </section>
        </main>
    </div>

    <script>
        const RESPONSE_ENDPOINT = 'http://localhost:3000/api/rsvp';
        const statusMessage = document.getElementById('statusMessage');
        const currentUser = localStorage.getItem('event-user');

        if (!currentUser) {
            window.location.href = 'index.html';
        }

        const savedAnswer = localStorage.getItem(`rsvp-${currentUser}`);
        if (savedAnswer) {
            updateStatusMessage(savedAnswer, 'Dit svar er hentet fra din browser.');
        }

        function updateStatusMessage(answer, syncText = '') {
            const prefix = answer === 'Nej' ? 'Øv!' : 'Tak!';
            const syncNote = syncText ? `<p style="margin-top: 10px; color: var(--muted);">${syncText}</p>` : '';
            statusMessage.innerHTML = `
                <h2>${prefix} Du svarede: ${answer}</h2>
                <p>Vil du ændre dit svar? Klik på en anden knap.</p>
                ${syncNote}
            `;
        }

        async function saveResponse(answer) {
            localStorage.setItem(`rsvp-${currentUser}`, answer);
            updateStatusMessage(answer, 'Forsøger at gemme dit svar centralt...');

            if (!RESPONSE_ENDPOINT || RESPONSE_ENDPOINT.includes('YOUR_BACKEND_URL')) {
                updateStatusMessage(answer, 'Svar gemt lokalt i browseren. Indsæt din backend-URL for at gemme centralt.');
                return;
            }

            try {
                const response = await fetch(RESPONSE_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name: currentUser, answer }),
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                updateStatusMessage(answer, 'Dit svar er sendt til backend og registreret centralt.');
            } catch (error) {
                console.error('Central opdatering mislykkedes:', error);
                updateStatusMessage(answer, 'Svar gemt lokalt, men central opdatering mislykkedes.');
            }
        }
    </script>
</body>
</html>
