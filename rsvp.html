<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svar - Forsinket kandidatfejring</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand">Forsinket kandidatfejring - Louisa Xu</div>
            <nav class="menu-bar">
                <a href="invitation.html">Forside</a>
                <a href="rsvp.html" class="active">Svar</a>
                <a href="guest-list.html">Gæsteliste</a>
            </nav>
        </header>

        <main class="content">
            <section class="hero-card small">
                <h1>Svar</h1>
                <p id="welcomeText">Skal du med?</p>
            </section>

            <section class="info-card">
                <div class="button-list">
                    <button data-answer="Ja" class="response-button yes">Ja</button>
                    <button data-answer="Måske" class="response-button maybe">Måske</button>
                    <button data-answer="Nej" class="response-button no">Nej</button>
                </div>
            </section>

            <section class="info-card response-message" id="statusMessage">
                <h2>Venter på dit svar...</h2>
                <p>Klik på en knap ovenfor.</p>
            </section>

            <section class="info-card">
                <h2>Hvorfor dit svar er vigtigt</h2>
                <p>Så Louisa ved, hvor mange øl og hvor meget mad hun skal købe.</p>
            </section>
        </main>
    </div>

    <script type="module">
        import { getUserByKey, VALID_ANSWERS } from "./event-data.js";
        import { listenToRsvps, saveRsvp } from "./firebase-rsvp.js";

        const statusMessage = document.getElementById("statusMessage");
        const welcomeText = document.getElementById("welcomeText");
        const currentUser = localStorage.getItem("event-user");
        const user = getUserByKey(currentUser);

        if (!currentUser || !user) {
            window.location.href = "index.html";
        } else {
            welcomeText.textContent = `Skal du med, ${user.name.split(" ")[0]}?`;
        }

        function updateStatusMessage(answer, syncText = "") {
            const prefix = answer === "Nej" ? "Øv!" : "Tak!";
            statusMessage.classList.add("filled");
            statusMessage.innerHTML = `
                <h2>${prefix} Du svarede: ${answer}</h2>
                <p>Vil du ændre dit svar? Klik på en anden knap.</p>
                ${syncText ? `<p class="muted-note">${syncText}</p>` : ""}
            `;
        }

        function showError(message) {
            statusMessage.classList.add("error");
            statusMessage.innerHTML = `<h2>Der skete en fejl</h2><p>${message}</p>`;
        }

        document.querySelectorAll("[data-answer]").forEach(button => {
            button.addEventListener("click", async () => {
                const answer = button.dataset.answer;
                if (!VALID_ANSWERS.includes(answer)) return;

                localStorage.setItem(`rsvp-${currentUser}`, answer);
                updateStatusMessage(answer, "Gemmer dit svar live...");

                try {
                    await saveRsvp(currentUser, answer);
                    updateStatusMessage(answer, "Dit svar er gemt live.");
                } catch (error) {
                    console.error(error);
                    updateStatusMessage(answer, "Svaret er gemt lokalt, men kunne ikke gemmes i Firebase. Tjek firebase-config.js og dine database-regler.");
                }
            });
        });

        listenToRsvps(
            data => {
                const answer = data[currentUser]?.answer || localStorage.getItem(`rsvp-${currentUser}`);
                if (answer) updateStatusMessage(answer, "Dit svar er hentet live fra Firebase.");
            },
            error => {
                console.error(error);
                const savedAnswer = localStorage.getItem(`rsvp-${currentUser}`);
                if (savedAnswer) {
                    updateStatusMessage(savedAnswer, "Dit svar er hentet fra denne browser. Firebase er ikke forbundet endnu.");
                } else {
                    showError("Firebase er ikke forbundet endnu. Udfyld firebase-config.js, og tjek dine database-regler.");
                }
            }
        );
    </script>
</body>
</html>
