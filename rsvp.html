<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forsinket kandidatfejring - Louisa Xu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand">Forsinket kandidatfejring - Louisa Xu</div>
            <nav class="menu-bar">
                <a href="invitation.html">Forside</a>
                <a href="rsvp.html" class="active">Svar</a>
                <a href="guest-list.html">Gæsteliste</a>
            </nav>
        </header>

        <main class="content">
            <section class="hero-card small">
                <h1>Svar</h1>
                <p>Skal du med?</p>
            </section>

            <!-- RESPONSE BUTTONS -->
            <section class="info-card">
                <div class="button-list">
                    <button onclick="saveResponse('Ja')" class="response-button yes">Ja</button>
                    <button onclick="saveResponse('Måske')" class="response-button maybe">Måske</button>
                    <button onclick="saveResponse('Nej')" class="response-button no">Nej</button>
                </div>
            </section>

            <section class="info-card" id="statusMessage">
                <h2>Venter på dit svar...</h2>
                <p>Klik på en knap ovenfor.</p>
            </section>

            <section class="info-card">
                <h2>Hvorfor dit svar er vigtigt</h2>
                <p>Så Louisa ved hvor mange øl og mad hun skal købe!</p>
            </section>
        </main>
    </div>

    <script>
        const GITHUB_TOKEN = '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';
        const GITHUB_API_URL = 'https://api.github.com/repos/louisa518/kandidatfejring/contents/responses.json';
        const statusMessage = document.getElementById('statusMessage');
        const currentUser = localStorage.getItem('event-user');

        if (!currentUser) {
            window.location.href = 'index.html';
        }

        // Check if user already answered and display
        const savedAnswer = localStorage.getItem(`rsvp-${currentUser}`);
        if (savedAnswer) {
            updateStatusMessage(savedAnswer);
        }

        function updateStatusMessage(answer) {
            const prefix = answer === 'Nej' ? 'Øv!' : 'Tak!';
            statusMessage.innerHTML = `<h2>${prefix} Du svarede: ${answer}</h2><p>Vil du ændre dit svar? Klik på en anden knap.</p>`;
        }

        async function saveResponse(answer) {
            // Update UI
            updateStatusMessage(answer);

            // Save to localStorage (backup)
            localStorage.setItem(`rsvp-${currentUser}`, answer);

            try {
                // Fetch current file to get SHA
                const getResponse = await fetch(GITHUB_API_URL, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                    }
                });
                const fileData = await getResponse.json();
                
                // Parse current responses
                const currentData = JSON.parse(atob(fileData.content));
                currentData[currentUser] = answer;
                
                // Update file on GitHub
                await fetch(GITHUB_API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: `Update ${currentUser} response to ${answer}`,
                        content: btoa(JSON.stringify(currentData, null, 2)),
                        sha: fileData.sha
                    })
                });

                console.log('Response saved to GitHub');
            } catch (error) {
                console.error('Error saving to GitHub:', error);
                // Data is already saved to localStorage
            }
        }
    </script>
</body>
</html>
